services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - hardening_network
  
  seeder:
    build:
      context: ./backend
      target: builder
    volumes:
      - ./database/seeds:/app/seeds
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - postgres
    command: node seeds/seed.js
    profiles: ["seed"]
    networks:
      - hardening_network

  backend:
    build:
      context: ./backend
      target: builder      
    volumes:
      - ./backend:/app    
      - /app/node_modules
      - ./vulnerable/robot_key:/app/robot_key:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      DEFAULT_STUDENT_HASH: ${DEFAULT_STUDENT_HASH}
      SSH_ROBOT_KEY_PATH: ${SSH_ROBOT_KEY_PATH}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    command: npm run start:dev
    networks:
      - hardening_network

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host
    networks:
      - hardening_network

  vulnerable:
    build:
      context: ./vulnerable
    ports:
      - "2223:22"
    restart: unless-stopped
    networks:
      - hardening_network

volumes:
  postgres_data:

networks:
  hardening_network:
    driver: bridge