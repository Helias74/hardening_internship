services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - hardening_network

  backend:
    build:
      context: ./backend
      target: run
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SSH_ROBOT_KEY_PATH: ${SSH_ROBOT_KEY_PATH}
      DEFAULT_STUDENT_HASH: ${DEFAULT_STUDENT_HASH}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./vulnerable/robot_key:/app/robot_key:ro
    depends_on:
      - postgres
    networks:
      - hardening_network

  frontend:
    build:
      context: ./frontend
      target: run
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hardening_network

volumes:
  pg_data:

networks:
  hardening_network:
    name: hardening_internship_hardening_network